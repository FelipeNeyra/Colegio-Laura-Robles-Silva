<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba con Bootstrap</title>
    <link rel="stylesheet" href="Descargas_Bootstrap/css/bootstrap.css">
</head>
<body>
    <header>
        <nav class="row bg-black text-white navbar navbar-expand-lg">
            <img src="images.png" alt="Logo" class="col-md-1" style="height: 120px; object-fit: contain;">

            <div class="col-md-11 m-0 p-0 d-flex align-items-center">
                <section>
                    <h1 class="h4 m-0 m-2">Panel de Navegación</h1>
                    <h4 class="ms-2 text-secondary">Más información en sitio web</h4>
                </section>

                <div class="ms-auto" id="navbarNav">
                <ul class="navbar-nav d-flex flex-row p-3">
                    <li class="nav-item">
                        <a class="nav-link text-white px-3 fs-4" href="#">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white px-3 fs-4" href="#">Servicios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white px-3 fs-4" href="#">Nosotros</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white px-3 fs-4" href="#">Contacto</a>
                    </li>
                    </li class="nav-item">
                        <form class="d-flex" role="search">
                        <input class="form-control me-2" type="search" placeholder="Ingresa tu búsqueda" aria-label="Ingresa"/>
                        <button class="btn btn-outline-success" type="submit">Buscar</button>
                        </form>
                    </li>
                </ul>

                </div>
            </div>
        </nav>
    </header>
    <main class="row cold-md-12 bg-danger">
        <section class="col-md-12">
            <img src="Computacion.png" alt="Sala_computacion" class="img-fluid" alt="Sala_computacion">
        </section>
    </main>
</body>
</html>
